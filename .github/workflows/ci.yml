name: CI — Testes e Linting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Instalar dependências do sistema (necessário para xhtml2pdf/pycairo)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt

      - name: Executar migrations
        env:
          USE_SQLITE: "True"
          DEBUG: "True"
          DJANGO_SECRET_KEY: "ci-secret-key-apenas-para-testes"
        run: python manage.py migrate

      - name: Rodar testes com cobertura
        env:
          USE_SQLITE: "True"
          DEBUG: "True"
          DJANGO_SECRET_KEY: "ci-secret-key-apenas-para-testes"
        run: |
          coverage run -m pytest
          coverage report --fail-under=70
          coverage xml

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Linting com flake8
        run: |
          flake8 core/ controle_veiculos_project/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__ \
            --ignore=E501,W503,E221,E241,E265,E266,E302,E128,E124,E701,W292,W293,F401,E272
